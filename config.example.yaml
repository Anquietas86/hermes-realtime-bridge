# Hermes Realtime Bridge Configuration
# Copy to config.yaml and customize

# ── Realtime API ──────────────────────────────────────────────────────────
model: gpt-realtime-2.1       # OpenAI Realtime model
voice: marin                  # TTS voice (marin, cedar, alloy, ash, coral, echo, sage, shimmer, verse)
temperature: 0.8              # Response variability (note: not a session param in GA API)
instructions: null            # System instructions (null = use default Jarvis prompt)
tools: true                   # Enable Hermes tool bridge

# ── Voice PE Adapter ─────────────────────────────────────────────────────
voice_pe:
  host: voice-pe.local        # ESPHome device hostname/IP
  port: 6053                  # ESPHome WebSocket port
  password: null              # ESPHome API password (null = no auth)

# ── Discord VC Adapter ───────────────────────────────────────────────────
discord:
  token: null                 # Discord bot token (or set DISCORD_BOT_TOKEN env var)
  guild_id: null              # Discord server (guild) ID
  channel_id: null            # Discord voice channel ID

# ── Matrix VC Adapter ────────────────────────────────────────────────────
matrix:
  homeserver: https://matrix.hagger.id.au
  access_token: null          # Matrix access token (or set MATRIX_ACCESS_TOKEN env var)
  user_id: "@jarvis:hagger.au"
  room_id: "!aNJPgFFXXZpbTnEjAG:hagger.au"  # Jarvis Voice room
  auto_answer: true           # Auto-accept incoming calls
